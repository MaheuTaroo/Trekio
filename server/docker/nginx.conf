events {
    worker_connections  1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

    # All of the load balancing choices doesn't matter because since jvm is dynamic and managed by docker,
    # nginx can't do the load balancing, docker is the one managing the chosen jvm for the connection
    upstream trekio {
        # default is round_robin; It connects to servers in circular logic always.
        least_conn; # It chooses the server with least connections and chooses that one
        # ip_hash; # It picks pc's IP and connects that IP to the same server, so only one jvm
        server jvm:8080;
    }

    server {
        listen       4000;
        server_name  localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            proxy_pass http://trekio;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
